<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>mathE Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="calculator">
      <h1>mathE Calculator</h1>
      <p class="display">Enter an arithmetic expression (example: 1234 + 56)</p>
      <div class="controls">
        <input id="expr" placeholder="e.g. 1234 + 56" />
        <div class="buttons">
          <button id="evalBtn">Evaluate</button>
          <button id="clearBtn">Clear</button>
        </div>
      </div>

      <div class="results">
        <div>Original result: <span id="original" class="result">—</span></div>
        <div>mathE result: <span id="reversed" class="result">—</span></div>
      </div>
    </div>

    <script src="mathE.js"></script>
  </body>
</html>
