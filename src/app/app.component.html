<div class="calculator">
  <h2>mathE Calculator</h2>
  <div class="display">Enter an expression (e.g. 12+34*2):</div>
  <div class="controls">
    <input [(ngModel)]="expression" placeholder="e.g. 1234 + 56" />
    <div>
      <button (click)="evaluate()">Evaluate</button>
      <button (click)="expression=''">Clear</button>
    </div>
  </div>

  <div class="results">
    <div>Original result: <span class="result">{{ originalResult }}</span></div>
    <div>mathE result: <span class="result">{{ reversedResult }}</span></div>
  </div>
</div>
